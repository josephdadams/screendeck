<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>ScreenDeck Settings</title>
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline';"
        />
        <link rel="stylesheet" href="./styles.css" />
        <style>
            body {
                font-family: sans-serif;
                margin: 20px;
                padding: 10px;
            }

            .device {
                border: 1px solid #ccc;
                padding: 10px;
                margin-bottom: 20px;
                border-radius: 6px;
                background: #f9f9f9;
            }

            .device label {
                font-weight: bold;
                margin-bottom: 2px;
            }

            .device input {
                width: 60px;
                margin-right: 10px;
            }

            .device-actions {
                margin-top: 10px;
            }

            button {
                padding: 5px 10px;
                margin-right: 5px;
            }

            #addDevice {
                margin-bottom: 20px;
                background-color: #4caf50;
                color: white;
                border: none;
                border-radius: 4px;
            }
        </style>
    </head>
    <body>
        <div class="window-container">
            <button id="closeButton" class="close-button-settings">×</button>
            <div style="text-align: center; margin-top: 20px">
                <img
                    src="../assets/tray-icon.png"
                    alt="ScreenDeck Logo"
                    style="width: 100px"
                />
            </div>
            <h1>ScreenDeck Settings</h1>
            <h2>Companion Connection</h2>
            <label for="companionIP">IP Address:</label>
            <input
                type="text"
                id="companionIP"
                placeholder="127.0.0.1"
                style="width: 120px"
            />
            <label for="companionPort">Port:</label>
            <input
                type="number"
                id="companionPort"
                placeholder="16622"
                style="width: 60px"
            />

            <br />
            <label for="showOnStartup">
                <input type="checkbox" id="showOnStartup" />
                Show ScreenDeck on Startup
            </label>
            <br />

            <button id="saveCompanion" style="width: 80x">Save</button>
            <span
                id="saveStatus"
                style="margin-left: 10px; font-size: 0.9em; color: green"
            ></span>

            <hr />

            <button id="addDevice">+ Add New ScreenDeck</button>

            <div id="deviceList"></div>

            <p style="font-size: 12px; text-align: center; opacity: 0.7">
                Built by
                <a href="https://josephadams.dev" target="_blank"
                    >Joseph Adams</a
                >
                — Need custom Companion modules or apps? Let's chat!
            </p>
        </div>
        <script src="./settings.js"></script>
    </body>
</html>
